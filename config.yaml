# Email settings (QQ Mail by default)
email:
  # IMAP server for receiving emails
  imap_server: "imap.qq.com"
  imap_port: 993
  # SMTP server for sending replies
  smtp_server: "smtp.qq.com"
  smtp_port: 587
  # Poll inbox interval (seconds)
  poll_interval: 30
  # NOTE: email address and password are loaded from .env file.
  #       See .env.example for the required variables:
  #         EMAIL_ADDRESS=your_bot@qq.com
  #         EMAIL_PASSWORD=your_authorization_code

# Douyin download settings
douyin:
  # Download save path (NAS path for Docker container visibility; absolute path)
  download_path: "/srv/nas_data/douyin_downloads"
  # Video filename template
  naming: "{create}_{aweme_id}"
  # Save videos to individual user folders
  folderize: true
  # Network timeout (seconds)
  timeout: 30
  # Max retries on failure
  max_retries: 3
  # Max concurrent download tasks
  max_tasks: 5
  # NOTE: douyin cookie is loaded from .env file.
  #       See .env.example:
  #         DOUYIN_COOKIE=your_douyin_cookie

# Bilibili download settings (via yutto)
bilibili:
  # Download save path (NAS path for Docker container visibility; absolute path)
  download_path: "/srv/nas_data/douyin_downloads/bilibili"
  # Max wall-clock time for one yutto process (seconds)
  timeout: 3600
  # Default video quality. 127 requests the highest available stream (8K tier,
  # with yutto falling back when that tier is unavailable).
  video_quality: 127
  # Batch mode for series/bangumi URLs (default: single item only)
  batch: false
  # yutto executable path. Docker exposes an isolated yutto CLI at "yutto".
  yutto_bin: "yutto"
  # NOTE: Bilibili auth is loaded from .env file if needed:
  #       BILIBILI_AUTH="SESSDATA=...; bili_jct=..."

# Bot behavior
bot:
  # Allowed sender email addresses (empty = allow all)
  allowed_senders: []
  # Cooldown per sender (seconds)
  cooldown_seconds: 5
  # Subject must contain this keyword to trigger download
  subject_keyword: "下载"
  # Retry transient network/timeout download failures before final failure.
  transient_retry_attempts: 3
  transient_retry_delay_seconds: 120
  # Project-relative files for queued retries and final failed links.
  transient_pending_file: "./pending_retries.json"
  transient_failed_file: "./failed_links.txt"
  # Special command keywords in email subject
  commands:
    # "更新cookie" — paste new DOUYIN_COOKIE in email body
    cookie_update: "更新cookie"
    # "自动获取cookie" — auto-extract from browser on this machine
    cookie_auto: "自动获取cookie"

# Headless Firefox cookie extraction (optional)
cookie_extractor:
  # Firefox profile directory for persistent cookies
  # Leave empty to use default: ~/.douyin_email_bot/firefox_profile/
  profile_dir: ""
  # Use headless mode (no visible browser window)
  headless: true
  # Validate extracted cookies by testing against douyin.com
  validate: true
